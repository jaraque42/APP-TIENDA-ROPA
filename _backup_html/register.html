<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNITE AL EQUIPO - Registro</title>
  
  <!-- Google Fonts: Space Grotesk (Titles), Plus Jakarta Sans (Body), Lexend (Labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="signup-container">
    
    <!-- Lado Izquierdo: Visual Asimétrico de Alto Impacto -->
    <section class="hero-image-section">
      <div class="image-overlay"></div>
      <img src="https://images.unsplash.com/photo-1556817411-31ae72fa3ea8?q=80&w=2070&auto=format&fit=crop" alt="Atleta de alto rendimiento en movimiento">
      <div class="hero-text">
        <span class="badge">NUEVA ERA</span>
        <h1>VELOCITY<br><span class="highlight">LENS</span></h1>
        <p>Reescribe las reglas del rendimiento. Equipamiento premium para atletas absolutos.</p>
      </div>
    </section>

    <!-- Lado Derecho: Formulario de Registro -->
    <section class="form-section">
      <div class="form-wrapper">
        <header>
          <h2>UNITE AL EQUIPO</h2>
          <p>Crea tu cuenta para acceder a drops exclusivos y herramientas de rendimiento.</p>
        </header>

        <form onsubmit="event.preventDefault(); alert('¡Cuenta creada con éxito!');">
          
          <div class="input-group">
            <label for="name">Nombre Completo</label>
            <input type="text" id="name" placeholder="Ej. Alex Runner" required>
          </div>

          <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="alex@velocity.com" required>
          </div>

          <div class="input-group">
            <label for="password">Contraseña Segura</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn-primary">CREAR CUENTA</button>
        </form>

        <div class="login-link">
          <p>¿Ya eres parte del equipo? <a href="#">Inicia Sesión</a></p>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
